services:
  app:
    build: .
    ports:
      - '8888:8888'
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: bash -lc "php artisan serve --host=0.0.0.0 --port=8888"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${APP_KEY:-}
